  <!-- RTL Detection - Early execution to prevent FOUT -->
  <script>
    (function () {
      try {
        var lng = localStorage.getItem('i18nextLng') || 'ar';
        if (lng.startsWith('ar')) {
          document.documentElement.dir = 'rtl';
          document.documentElement.lang = 'ar';
        } else {
          document.documentElement.dir = 'ltr';
          document.documentElement.lang = lng;
        }
      } catch (e) {
        document.documentElement.dir = 'rtl';
        document.documentElement.lang = 'ar';
      }
    })();
  </script>

  <!-- Global Error Handler - Prevents app crashes -->
  <script>
    window.onerror = function (msg, source, line, col, error) {
      console.error('🚨 Error:', msg, source, line);
      if (window.location.hostname !== 'localhost') {
        // In production, send to monitoring service
        // Sentry.captureException(error);
      }
      return true; // Prevent default error handling
    };

    window.onunhandledrejection = function (e) {
      console.error('🚨 Unhandled rejection:', e.reason);
      if (window.location.hostname !== 'localhost') {
        // Sentry.captureException(e.reason);
      }
      e.preventDefault();
    };

    console.log('🛡️ Global error handler ready');
  </script>
